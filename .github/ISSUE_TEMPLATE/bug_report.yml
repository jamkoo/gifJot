name: Bug report
description: Report a reproducible problem with GifJot
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thank you for helping improve GifJot. Do not include private recordings, personal file paths, credentials, or other sensitive information. Report security or privacy vulnerabilities through the private process in SECURITY.md.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this problem.
          required: true
        - label: I reproduced this with the current default branch or newest available build.
          required: true
        - label: I removed private content from this report and its attachments.
          required: true

  - type: input
    id: version
    attributes:
      label: GifJot version or commit
      description: Provide a release version, build number, or commit SHA.
      placeholder: 0.1.0 development build or commit SHA
    validations:
      required: true

  - type: input
    id: macos_version
    attributes:
      label: macOS version
      placeholder: macOS 15.5
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options:
        - Apple silicon
        - Intel
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: permission_state
    attributes:
      label: Screen Recording permission state
      options:
        - Not requested
        - Allowed
        - Denied
        - Revoked or changed
        - Unknown
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use non-sensitive test content and provide the smallest reliable sequence.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include exact error text when it is safe to share.
    validations:
      required: true

  - type: textarea
    id: display_setup
    attributes:
      label: Display setup
      description: List display count, arrangement, scale, and which display contained the region.
      placeholder: Built-in Retina display with one external display arranged to the left

  - type: textarea
    id: settings
    attributes:
      label: Relevant GifJot settings
      description: Include output width, frame rate, countdown, cursor visibility, and copy behavior when relevant.

  - type: textarea
    id: diagnostics
    attributes:
      label: Redacted diagnostics
      description: Paste only privacy-safe logs or metadata. Do not attach captured content unless it is synthetic and safe to publish.
      render: shell

  - type: checkboxes
    id: conduct
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
