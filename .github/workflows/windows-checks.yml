name: Windows Checks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  SWIFT_VERSION: 6.3.3

jobs:
  preflight-and-core-tests:
    runs-on: windows-2025
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Swift for Windows
        shell: pwsh
        run: |
          winget install `
            --id Swift.Toolchain `
            --exact `
            --version $env:SWIFT_VERSION `
            --source winget `
            --accept-package-agreements `
            --accept-source-agreements `
            --silent `
            --disable-interactivity

          $searchRoots = @(
            @(
              "$env:ProgramFiles\Swift",
              "$env:LOCALAPPDATA\Programs\Swift",
              "C:\Library\Developer\Toolchains"
            ) | Where-Object { Test-Path -LiteralPath $_ }
          )

          if ($searchRoots.Count -eq 0) {
            throw "Swift was installed but no toolchain directory was created."
          }

          $swift = Get-ChildItem `
            -Path $searchRoots `
            -Filter swift.exe `
            -File `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if ($null -eq $swift) {
            throw "Swift was installed but swift.exe could not be located."
          }

          $swiftRuntime = Get-ChildItem `
            -Path $searchRoots `
            -Filter swiftCore.dll `
            -File `
            -Recurse `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if ($null -eq $swiftRuntime) {
            throw "Swift was installed but its runtime directory could not be located."
          }

          @($swift.DirectoryName, $swiftRuntime.DirectoryName) |
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Run Windows preflight and shared Swift tests
        shell: pwsh
        run: ./scripts/check-windows.ps1 -RequireSwift
